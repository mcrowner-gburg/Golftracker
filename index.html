<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Skins Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a4a2e;
    --green-mid: #2d6e47;
    --green-light: #3d8f5f;
    --fairway: #4aab6d;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --sand: #e8d5a3;
    --water: #3a7bd5;
    --red: #c0392b;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green);
    color: var(--cream);
    min-height: 100vh;
    padding: 0 0 80px 0;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(77,171,109,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(26,74,46,0.8) 0%, transparent 50%);
  }

  header {
    background: linear-gradient(135deg, #0f2e1c 0%, #1a4a2e 100%);
    padding: 20px 20px 16px;
    border-bottom: 3px solid var(--gold);
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .flag-icon { font-size: 28px; }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    color: var(--gold);
    line-height: 1;
  }

  header p {
    font-size: 11px;
    color: rgba(245,240,232,0.55);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #setup {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .player-inputs {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .player-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .player-row input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    color: var(--cream);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .player-row input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.1);
  }

  .player-row input::placeholder { color: rgba(245,240,232,0.3); }

  .btn-remove {
    background: rgba(192,57,43,0.2);
    border: 1.5px solid rgba(192,57,43,0.4);
    border-radius: 8px;
    color: #e74c3c;
    width: 40px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-remove:hover { background: rgba(192,57,43,0.4); }

  .btn-add {
    background: transparent;
    border: 1.5px dashed rgba(201,168,76,0.4);
    border-radius: 8px;
    color: rgba(201,168,76,0.7);
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-add:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, #a8813a 100%);
    border: none;
    border-radius: 10px;
    color: #1a1a1a;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    padding: 15px;
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(201,168,76,0.3);
  }

  .btn-start:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(201,168,76,0.45);
  }

  #game { display: none; max-width: 520px; margin: 0 auto; padding: 16px 14px; }

  .hole-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .hole-nav-btn {
    background: rgba(201,168,76,0.15);
    border: 1.5px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    color: var(--gold);
    width: 38px;
    height: 38px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .hole-nav-btn:hover { background: rgba(201,168,76,0.3); }
  .hole-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .hole-info { text-align: center; }
  .hole-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 2px;
    line-height: 1;
  }
  .hole-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }

  .hole-dots {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .hole-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 600;
  }

  .hole-dot.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1a1a;
  }

  .hole-dot.has-data {
    background: rgba(74,171,109,0.4);
    border-color: var(--fairway);
  }

  .players-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .player-card {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }

  .player-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .player-name-display {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .player-hole-total {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.3);
  }

  .bets-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .bet-btn {
    flex: 1;
    min-width: 56px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(245,240,232,0.6);
    padding: 7px 4px 5px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
  }

  .bet-btn .bet-icon { font-size: 16px; display: block; }
  .bet-btn .bet-label { font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase; }

  .bet-btn.active {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold);
  }

  .bet-btn.barkie.active { background: rgba(139,90,43,0.3); border-color: #a0652a; color: #d4884e; }
  .bet-btn.splashie.active { background: rgba(58,123,213,0.25); border-color: var(--water); color: #7ab8f5; }
  .bet-btn.sandie.active { background: rgba(232,213,163,0.2); border-color: var(--sand); color: #d4b96e; }
  .bet-btn.greenie.active { background: rgba(74,171,109,0.25); border-color: var(--fairway); color: #6dca8f; }
  .bet-btn.poley.active { background: rgba(201,168,76,0.25); border-color: var(--gold); color: #e8c96a; }
  .bet-btn.poley-minus.active { background: rgba(192,57,43,0.25); border-color: var(--red); color: #e87070; }

  #scoreboard { display: none; max-width: 520px; margin: 0 auto; padding: 16px 14px; }

  .scoreboard-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 16px;
  }

  .score-table {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.2);
    margin-bottom: 16px;
  }

  .score-table-head {
    display: grid;
    grid-template-columns: 1fr repeat(6, 40px) 50px;
    gap: 0;
    background: rgba(201,168,76,0.15);
    padding: 8px 12px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .score-table-head span {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(201,168,76,0.8);
    text-align: center;
  }

  .score-table-head span:first-child { text-align: left; }

  .score-row {
    display: grid;
    grid-template-columns: 1fr repeat(6, 40px) 50px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: center;
  }

  .score-row:last-child { border-bottom: none; }

  .score-row span { text-align: center; font-size: 15px; font-weight: 500; }
  .score-row .name { text-align: left; font-weight: 600; font-size: 14px; }
  .score-row .total-earned { color: var(--fairway); font-weight: 700; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; }

  .settlements {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    border: 1px solid rgba(201,168,76,0.2);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .settlements-title {
    background: rgba(201,168,76,0.15);
    padding: 8px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--gold);
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .settlement-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
  }

  .settlement-item:last-child { border-bottom: none; }

  .settle-payer { font-weight: 600; color: var(--red); }
  .settle-arrow { color: rgba(255,255,255,0.3); }
  .settle-receiver { font-weight: 600; color: var(--fairway); }
  .settle-amount {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--gold);
  }

  .no-settlements {
    padding: 20px;
    text-align: center;
    color: rgba(245,240,232,0.4);
    font-size: 14px;
  }

  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    background: #0d2619;
    border-top: 2px solid rgba(201,168,76,0.3);
    z-index: 200;
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: rgba(245,240,232,0.4);
    padding: 12px 0 10px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .tab-btn .tab-icon { font-size: 20px; display: block; }
  .tab-btn .tab-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; display: block; }

  .tab-btn.active { color: var(--gold); }

  .bet-legend {
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .legend-item {
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 4px;
    color: rgba(245,240,232,0.55);
  }

  .btn-finish {
    width: 100%;
    background: linear-gradient(135deg, var(--green-mid) 0%, var(--green) 100%);
    border: 1.5px solid var(--fairway);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-finish:hover { background: linear-gradient(135deg, var(--green-light) 0%, var(--green-mid) 100%); }

  .btn-new-game {
    width: 100%;
    background: transparent;
    border: 1.5px solid rgba(192,57,43,0.5);
    border-radius: 10px;
    color: #e74c3c;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-new-game:hover { background: rgba(192,57,43,0.1); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <span class="flag-icon">⛳</span>
  <div>
    <h1>Side Bets</h1>
    <p>Golf Skins Tracker</p>
  </div>
</header>

<div id="setup">
  <p class="section-label">Players</p>
  <div class="player-inputs" id="playerInputs">
    <div class="player-row">
      <input type="text" placeholder="Player 1 name" maxlength="20">
      <button class="btn-remove" onclick="removePlayer(this)">×</button>
    </div>
    <div class="player-row">
      <input type="text" placeholder="Player 2 name" maxlength="20">
      <button class="btn-remove" onclick="removePlayer(this)">×</button>
    </div>
    <div class="player-row">
      <input type="text" placeholder="Player 3 name" maxlength="20">
      <button class="btn-remove" onclick="removePlayer(this)">×</button>
    </div>
    <div class="player-row">
      <input type="text" placeholder="Player 4 name" maxlength="20">
      <button class="btn-remove" onclick="removePlayer(this)">×</button>
    </div>
  </div>
  <button class="btn-add" onclick="addPlayer()">+ Add Player</button>

  <p class="section-label" style="margin-top:24px;">Holes</p>
  <div style="display:flex;gap:10px;">
    <button id="holes9" onclick="setHoles(9)" style="flex:1;background:rgba(201,168,76,0.25);border:2px solid var(--gold);border-radius:8px;color:var(--gold);padding:11px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;">9</button>
    <button id="holes18" onclick="setHoles(18)" style="flex:1;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(245,240,232,0.5);padding:11px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;">18</button>
  </div>

  <button class="btn-start" onclick="startGame()">Tee It Up →</button>
</div>

<div id="game">
  <div class="hole-dots" id="holeDots"></div>

  <div class="hole-nav">
    <button class="hole-nav-btn" id="prevBtn" onclick="changeHole(-1)">‹</button>
    <div class="hole-info">
      <div class="hole-number" id="holeNum">HOLE 1</div>
      <div class="hole-label">Current Hole</div>
    </div>
    <button class="hole-nav-btn" id="nextBtn" onclick="changeHole(1)">›</button>
  </div>

  <div class="bet-legend">
    <span class="legend-item">🐶 Barkie</span>
    <span class="legend-item">💦 Splashie</span>
    <span class="legend-item">⛱️ Sandie</span>
    <span class="legend-item">🟢 Greenie</span>
    <span class="legend-item">🎯 Poley +1</span>
    <span class="legend-item">⚠️ Poley -1</span>
    <span class="legend-item" style="margin-left:auto;font-size:10px;color:rgba(201,168,76,0.6);">$1 each</span>
  </div>

  <div class="players-grid" id="playersGrid"></div>

  <button class="btn-finish" onclick="showScoreboard()">View Scoreboard →</button>
</div>

<div id="scoreboard">
  <div class="scoreboard-title">Final Scoreboard</div>

  <div class="score-table">
    <div class="score-table-head">
      <span>Player</span>
      <span>🐶</span>
      <span>💦</span>
      <span>⛱️</span>
      <span>🟢</span>
      <span>🎯+</span>
      <span>🎯−</span>
      <span>Total</span>
    </div>
    <div id="scoreRows"></div>
  </div>

  <div class="settlements">
    <div class="settlements-title">💰 Who Pays Who</div>
    <div id="settlementList"></div>
  </div>

  <button class="btn-finish" onclick="showGame()">← Back to Scoring</button>
  <button class="btn-new-game" onclick="newGame()">New Game</button>
</div>

<div class="tab-bar hidden" id="tabBar">
  <button class="tab-btn active" id="tabGame" onclick="showGame()">
    <span class="tab-icon">⛳</span>
    <span class="tab-label">Scoring</span>
  </button>
  <button class="tab-btn" id="tabScore" onclick="showScoreboard()">
    <span class="tab-icon">📊</span>
    <span class="tab-label">Scoreboard</span>
  </button>
</div>

<script>
const BETS = [
  { key: 'barkie',      icon: '🐶', label: 'Barkie',    cls: 'barkie',      value:  1, tip: 'Up and down despite a tree hit' },
  { key: 'splashie',    icon: '💦', label: 'Splashie',  cls: 'splashie',    value:  1, tip: 'Up and down after a water shot' },
  { key: 'sandie',      icon: '⛱️', label: 'Sandie',    cls: 'sandie',      value:  1, tip: 'Up and down after a bunker shot' },
  { key: 'greenie',     icon: '🟢', label: 'Greenie',   cls: 'greenie',     value:  1, tip: 'Closest to pin on a par 3' },
  { key: 'poley_plus',  icon: '🎯', label: 'Poley +1',  cls: 'poley',       value:  1, tip: 'One putt from outside the pole length' },
  { key: 'poley_minus', icon: '⚠️', label: 'Poley -1',  cls: 'poley-minus', value: -1, tip: 'Three putt from outside the pole length' },
];

let players = [];
let totalHoles = 9;
let currentHole = 0;
let scores = [];
let gameActive = false;

function setHoles(n) {
  totalHoles = n;
  document.getElementById('holes9').style.background = n === 9 ? 'rgba(201,168,76,0.25)' : 'rgba(255,255,255,0.05)';
  document.getElementById('holes9').style.borderColor = n === 9 ? 'var(--gold)' : 'rgba(255,255,255,0.15)';
  document.getElementById('holes9').style.color = n === 9 ? 'var(--gold)' : 'rgba(245,240,232,0.5)';
  document.getElementById('holes18').style.background = n === 18 ? 'rgba(201,168,76,0.25)' : 'rgba(255,255,255,0.05)';
  document.getElementById('holes18').style.borderColor = n === 18 ? 'var(--gold)' : 'rgba(255,255,255,0.15)';
  document.getElementById('holes18').style.color = n === 18 ? 'var(--gold)' : 'rgba(245,240,232,0.5)';
}

function addPlayer() {
  const container = document.getElementById('playerInputs');
  const n = container.children.length + 1;
  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `<input type="text" placeholder="Player ${n} name" maxlength="20"><button class="btn-remove" onclick="removePlayer(this)">×</button>`;
  container.appendChild(row);
}

function removePlayer(btn) {
  const container = document.getElementById('playerInputs');
  if (container.children.length <= 2) return;
  btn.parentElement.remove();
}

function startGame() {
  const inputs = document.querySelectorAll('#playerInputs input');
  players = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `Player ${i + 1}`;
    players.push(name);
  });

  if (players.length < 2) { alert('Need at least 2 players!'); return; }

  scores = players.map(() =>
    Array.from({ length: totalHoles }, () => {
      const obj = {};
      BETS.forEach(b => obj[b.key] = false);
      return obj;
    })
  );

  currentHole = 0;
  gameActive = true;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('tabBar').classList.remove('hidden');

  buildHoleDots();
  renderHole();
}

function buildHoleDots() {
  const container = document.getElementById('holeDots');
  container.innerHTML = '';
  for (let h = 0; h < totalHoles; h++) {
    const dot = document.createElement('div');
    dot.className = 'hole-dot' + (h === currentHole ? ' active' : '');
    dot.textContent = h + 1;
    dot.onclick = () => { currentHole = h; renderHole(); };
    container.appendChild(dot);
  }
}

function updateDots() {
  const dots = document.querySelectorAll('.hole-dot');
  dots.forEach((dot, h) => {
    dot.className = 'hole-dot';
    if (h === currentHole) dot.classList.add('active');
    else if (holeHasData(h)) dot.classList.add('has-data');
  });
}

function holeHasData(h) {
  return players.some((_, pi) => BETS.some(b => scores[pi][h][b.key]));
}

function renderHole() {
  document.getElementById('holeNum').textContent = `HOLE ${currentHole + 1}`;
  document.getElementById('prevBtn').disabled = currentHole === 0;
  document.getElementById('nextBtn').disabled = currentHole === totalHoles - 1;

  const grid = document.getElementById('playersGrid');
  grid.innerHTML = '';

  players.forEach((name, pi) => {
    const holeScore = scores[pi][currentHole];
    const earned = BETS.reduce((sum, b) => holeScore[b.key] ? sum + b.value : sum, 0);

    const card = document.createElement('div');
    card.className = 'player-card';
    card.innerHTML = `
      <div class="player-card-header">
        <div class="player-name-display">${name}</div>
        <div class="player-hole-total">${earned > 0 ? `+$${earned}` : earned < 0 ? `-$${Math.abs(earned)}` : '–'}</div>
      </div>
      <div class="bets-row">
        ${BETS.map(b => `
          <button class="bet-btn ${b.cls} ${holeScore[b.key] ? 'active' : ''}"
            onclick="toggleBet(${pi}, '${b.key}')"
            title="${b.tip}">
            <span class="bet-icon">${b.icon}</span>
            <span class="bet-label">${b.label}</span>
          </button>
        `).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  updateDots();
}

function toggleBet(playerIdx, betKey) {
  scores[playerIdx][currentHole][betKey] = !scores[playerIdx][currentHole][betKey];
  renderHole();
}

function changeHole(dir) {
  currentHole = Math.max(0, Math.min(totalHoles - 1, currentHole + dir));
  renderHole();
}

function getTotals() {
  return players.map((name, pi) => {
    const totals = { name };
    let grand = 0;
    BETS.forEach(b => {
      let count = 0;
      for (let h = 0; h < totalHoles; h++) {
        if (scores[pi][h][b.key]) count++;
      }
      totals[b.key] = count;
      grand += count * b.value;
    });
    totals.grand = grand;
    return totals;
  });
}

function getSettlements(totals) {
  const grandTotal = totals.reduce((s, t) => s + t.grand, 0);
  const avg = grandTotal / players.length;
  const nets = totals.map(t => ({ name: t.name, net: t.grand - avg }));

  const payers = nets.filter(n => n.net < -0.001).map(n => ({ name: n.name, amount: -n.net }));
  const receivers = nets.filter(n => n.net > 0.001).map(n => ({ name: n.name, amount: n.net }));

  const transactions = [];
  let pi = 0, ri = 0;
  while (pi < payers.length && ri < receivers.length) {
    const pay = Math.min(payers[pi].amount, receivers[ri].amount);
    if (pay > 0.005) {
      transactions.push({ from: payers[pi].name, to: receivers[ri].name, amount: pay });
    }
    payers[pi].amount -= pay;
    receivers[ri].amount -= pay;
    if (payers[pi].amount < 0.005) pi++;
    if (receivers[ri].amount < 0.005) ri++;
  }
  return transactions;
}

function showScoreboard() {
  document.getElementById('game').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'block';
  document.getElementById('tabGame').classList.remove('active');
  document.getElementById('tabScore').classList.add('active');

  const totals = getTotals();
  const rows = document.getElementById('scoreRows');
  rows.innerHTML = '';

  totals.forEach(t => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <span class="name">${t.name}</span>
      ${BETS.map(b => `<span style="${b.value < 0 && t[b.key] ? 'color:var(--red)' : ''}">${t[b.key] || '–'}</span>`).join('')}
      <span class="total-earned" style="${t.grand < 0 ? 'color:var(--red)' : ''}">${t.grand >= 0 ? '$' + t.grand : '-$' + Math.abs(t.grand)}</span>
    `;
    rows.appendChild(row);
  });

  const txns = getSettlements(totals);
  const list = document.getElementById('settlementList');
  list.innerHTML = '';
  if (txns.length === 0) {
    list.innerHTML = '<div class="no-settlements">All square! No payments needed 🎉</div>';
  } else {
    txns.forEach(tx => {
      const item = document.createElement('div');
      item.className = 'settlement-item';
      item.innerHTML = `
        <span class="settle-payer">${tx.from}</span>
        <span class="settle-arrow">pays</span>
        <span class="settle-receiver">${tx.to}</span>
        <span class="settle-amount">$${tx.amount.toFixed(2).replace('.00','')}</span>
      `;
      list.appendChild(item);
    });
  }
}

function showGame() {
  document.getElementById('scoreboard').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('tabScore').classList.remove('active');
  document.getElementById('tabGame').classList.add('active');
  renderHole();
}

function newGame() {
  if (!confirm('Start a new game? Current scores will be lost.')) return;
  gameActive = false;
  document.getElementById('scoreboard').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
  document.getElementById('tabBar').classList.add('hidden');
}
</script>
